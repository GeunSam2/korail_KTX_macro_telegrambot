name: Build Image

on:
    push:
        branches:
            - 'master'
    workflow_dispatch:

jobs:
  cicd:
    runs-on: ubuntu-latest
    steps:
    -
        name: Checkout
        uses: actions/checkout@v2
    -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
    -
        name: Login to DockerHub
        uses: docker/login-action@v1
        with:
            username: ${{ secrets.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_TOKEN }}
    -
        name: Build Container Image
        uses: docker/build-push-action@v4
        with:
            context: .
            file: ./Dockerfile
            platforms: linux/amd64
            push: true
            tags: geunsam2/korailbot:latest
            cache-from: type=gha
            cache-to: type=gha,mode=max

    -
        name: Copy docker-compose.yml to server
        uses: appleboy/scp-action@master
        with:
            host: server.geunsam2.xyz
            username: ${{ secrets.SSH_USERNAME }}
            password: ${{ secrets.SSH_PASSWORD }}
            port: 22
            source: "docker-compose.yml"
            target: "/home/${{ secrets.SSH_USERNAME }}/korail_bot/"

    -
        name: Deploy with Docker Compose
        uses: appleboy/ssh-action@v1.2.0
        with:
            host: server.geunsam2.xyz
            username: ${{ secrets.SSH_USERNAME }}
            password: ${{ secrets.SSH_PASSWORD }}
            port: 22
            timeout: 60s
            script: |
                cd /home/${{ secrets.SSH_USERNAME }}/korail_bot || exit 1

                # Create .env file with secrets
                cat > .env << EOF
                USERID=${{ secrets.ADMIN_USERID }}
                USERPW=${{ secrets.ADMIN_PASSWD}}
                BOTTOKEN=${{ secrets.TELEGRAM_BOTTOKEN }}
                ALLOW_LIST=${{ vars.ALLOW_LIST }}
                REDIS_HOST=redis
                REDIS_PORT=6379
                REDIS_DB=0
                EOF

                # Login to Docker Hub
                docker login -u ${{ secrets.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_TOKEN }}

                # Pull latest image
                docker pull geunsam2/korailbot:latest

                # Stop and remove old containers
                docker compose down

                # Start services with Docker Compose
                docker compose up -d

                # Show status
                echo "=== Docker Compose Status ==="
                docker compose ps
                echo ""
                echo "=== Recent Logs ==="
                docker compose logs --tail=30
